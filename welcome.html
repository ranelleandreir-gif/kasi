<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Admin</title>

<style>
:root {
  color-scheme: dark;
  font-family: Inter, Arial, sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at top, rgba(34,197,94,0.18), transparent 24%),
              radial-gradient(circle at bottom, rgba(59,130,246,0.16), transparent 22%),
              linear-gradient(180deg, #04090f 0%, #070c12 100%);
  color: #e5e7eb;
}

.panel {
  width: min(560px, calc(100% - 32px));
  padding: 34px 30px;
  border-radius: 32px;
  backdrop-filter: blur(24px);
  background: rgba(15,23,42,0.9);
  border: 1px solid rgba(148,163,184,0.12);
  text-align: center;
  box-shadow: 0 32px 90px rgba(0,0,0,0.35);
}

.title {
  margin: 0;
  font-size: clamp(2.2rem, 3vw, 3rem);
  letter-spacing: -0.04em;
  background: linear-gradient(90deg, #22c55e, #3b82f6, #f59e0b);
  -webkit-background-clip: text;
  color: transparent;
}

.subtext {
  color: #94a3b8;
  margin: 16px auto 0;
  max-width: 420px;
  line-height: 1.7;
}

.loader {
  margin: 30px auto 0;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 6px solid rgba(255,255,255,0.12);
  border-top-color: #22c55e;
  animation: spin 1s linear infinite;
}

.status {
  margin-top: 24px;
  color: #cbd5e1;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 1rem;
}

.status::after {
  content: " ";
  animation: dots 1.2s infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes dots {
  0% { content: ""; }
  25% { content: "."; }
  50% { content: ".."; }
  75% { content: "..."; }
  100% { content: ""; }
}
</style>
</head>
<body>
  <div class="panel">
    <h1 class="title">Welcome, Admin</h1>
    <p class="subtext">Your dashboard is loading. When it is ready, you will be taken to the admin control center.</p>
    <div class="admin-key-panel">
      <input id="adminKey" type="password" placeholder="Enter admin access key">
      <button id="unlockButton">Unlock Admin Dashboard</button>
      <div class="status" id="adminStatus">Enter the access key to continue.</div>
    </div>
    <div class="loader" id="loader"></div>
  </div>

<script>
  const ADMIN_ACCESS_KEY = "KASIPAG-ADMIN-2026";
  const unlockButton = document.getElementById("unlockButton");
  const adminKeyInput = document.getElementById("adminKey");
  const adminStatus = document.getElementById("adminStatus");
  const loader = document.getElementById("loader");

  unlockButton.addEventListener("click", () => {
    const value = adminKeyInput.value.trim();

    if (!value) {
      adminStatus.textContent = "Please enter the access key.";
      adminStatus.style.color = "#f87171";
      return;
    }

    if (value !== ADMIN_ACCESS_KEY) {
      adminStatus.textContent = "Wrong access key. Try again.";
      adminStatus.style.color = "#f87171";
      return;
    }

    adminStatus.textContent = "Access key accepted. Loading admin dashboard...";
    adminStatus.style.color = "#22c55e";
    loader.style.display = "block";
    unlockButton.disabled = true;
    adminKeyInput.disabled = true;

    setTimeout(() => {
      window.location.replace("admin-dashboard.html");
    }, 1400);
  });
</script>
</body>
</html>
