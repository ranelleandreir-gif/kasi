<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome Admin</title>

<style>
:root {
  color-scheme: dark;
  font-family: Inter, Arial, sans-serif;
}

* { box-sizing: border-box; }

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at top, rgba(34,197,94,0.18), transparent 24%),
              radial-gradient(circle at bottom, rgba(59,130,246,0.16), transparent 22%),
              linear-gradient(180deg, #04090f 0%, #070c12 100%);
  color: #e5e7eb;
}

.panel {
  width: min(560px, calc(100% - 32px));
  padding: 34px 30px;
  border-radius: 32px;
  backdrop-filter: blur(24px);
  background: rgba(15,23,42,0.9);
  border: 1px solid rgba(148,163,184,0.12);
  text-align: center;
  box-shadow: 0 32px 90px rgba(0,0,0,0.35);
}

.panel-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.logout-btn {
  background: #ef4444;
  color: white;
  border: none;
  border-radius: 12px;
  padding: 8px 14px;
  font-size: 0.85rem;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.logout-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(239, 68, 68, 0.3);
}

.title {
  margin: 0;
  font-size: clamp(2.2rem, 3vw, 3rem);
  letter-spacing: -0.04em;
  background: linear-gradient(90deg, #22c55e, #3b82f6, #f59e0b);
  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;
}

.subtext {
  color: #94a3b8;
  margin: 16px auto 0;
  max-width: 420px;
  line-height: 1.7;
}

.loader {
  margin: 30px auto 0;
  width: 72px;
  height: 72px;
  border-radius: 50%;
  border: 6px solid rgba(255,255,255,0.12);
  border-top-color: #22c55e;
  animation: spin 1s linear infinite;
}

.status {
  margin-top: 24px;
  color: #cbd5e1;
  display: inline-flex;
  align-items: center;
  gap: 10px;
  font-size: 1rem;
}

.status::after {
  content: " ";
  animation: dots 1.2s infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

@keyframes dots {
  0% { content: ""; }
  25% { content: "."; }
  50% { content: ".."; }
  75% { content: "..."; }
  100% { content: ""; }
}

.admin-key-panel {
  margin-top: 24px;
  display: grid;
  gap: 12px;
}

.admin-key-panel input,
.admin-key-panel button {
  width: 100%;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.14);
  padding: 14px 16px;
  font-size: 1rem;
}

.admin-key-panel button {
  background: linear-gradient(135deg, #22c55e, #3b82f6);
  color: #071018;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.admin-key-panel button:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 35px rgba(34,197,94,0.18);
}

#loader {
  display: none;
  opacity: 0;
  transform: scale(0.92);
  transition: opacity 0.24s ease, transform 0.24s ease;
}

#loader.active {
  display: block;
  opacity: 1;
  transform: scale(1);
}

.panel {
  animation: floatIn 0.72s ease-out both;
}

@keyframes floatIn {
  from { opacity: 0; transform: translateY(24px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@media (max-width: 640px) {
  .panel {
    width: calc(100% - 28px);
    padding: 28px 22px;
  }

  .title {
    font-size: 2.1rem;
  }

  .status {
    font-size: 0.95rem;
  }
}
</style>
</head>
<body>
  <div class="panel">
    <div class="panel-header">
      <h1 class="title">Welcome, Admin</h1>
      <button class="logout-btn" onclick="logout()">🚪 Logout</button>
    </div>
    <p class="subtext">Your dashboard is loading. When it is ready, you will be taken to the admin control center.</p>
    <div class="admin-key-panel">
      <input id="adminKey" type="password" placeholder="Enter admin access key">
      <button id="unlockButton">Unlock Admin Dashboard</button>
      <div class="status" id="adminStatus">Enter the access key to continue.</div>
    </div>
    <div class="loader" id="loader"></div>
  </div>

<script>
  const ADMIN_ACCESS_KEY = "KASIPAG-ADMIN-2026";
  const unlockButton = document.getElementById("unlockButton");
  const adminKeyInput = document.getElementById("adminKey");
  const adminStatus = document.getElementById("adminStatus");
  const loader = document.getElementById("loader");

  unlockButton.addEventListener("click", () => {
    const value = adminKeyInput.value.trim();

    if (!value) {
      adminStatus.textContent = "Please enter the access key.";
      adminStatus.style.color = "#f87171";
      return;
    }

    if (value !== ADMIN_ACCESS_KEY) {
      adminStatus.textContent = "Wrong access key. Try again.";
      adminStatus.style.color = "#f87171";
      return;
    }

    adminStatus.textContent = "Access key accepted. Loading admin dashboard...";
    adminStatus.style.color = "#22c55e";
    loader.classList.add("active");
    unlockButton.disabled = true;
    adminKeyInput.disabled = true;

    setTimeout(() => {
      window.location.replace("admin-dashboard.html");
    }, 1400);
  });

  async function logout() {
    // Import Firebase auth dynamically
    const { getAuth, signOut } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js");
    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
    
    const firebaseConfig = {
      apiKey: "AIzaSyAw_VjcITG-Rltan00gLQF7gui64O1hfPo",
      authDomain: "kasi-76cbd.firebaseapp.com",
      projectId: "kasi-76cbd",
      storageBucket: "kasi-76cbd.appspot.com",
      messagingSenderId: "887548997152",
      appId: "1:887548997152:web:ce02811972446a86a15645"
    };
    
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    
    await signOut(auth);
    window.location.href = "role-selector.html";
  }
</script>
</body>
</html>
