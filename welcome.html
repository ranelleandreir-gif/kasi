<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
  font-family:Arial;
  overflow:hidden;
}

.box{
  text-align:center;
  color:white;
  animation: fadeIn 0.8s ease forwards;
  transform:scale(0.6);
  opacity:0;
}

h1{
  font-size:40px;
  margin:0;
  background: linear-gradient(90deg,#3b82f6,#22c55e,#f59e0b);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation: zoom 1s ease forwards;
}

p{
  opacity:0.7;
  margin-top:10px;
}

@keyframes fadeIn{
  to{
    opacity:1;
    transform:scale(1);
  }
}

@keyframes zoom{
  from{transform:scale(0.3);}
  to{transform:scale(1);}
}

.dots::after{
  content:"";
  animation:dots 1.2s infinite;
}

@keyframes dots{
  0%{content:"";}
  25%{content:".";}
  50%{content:"..";}
  75%{content:"...";}
  100%{content:"";}
}
</style>

</head>
<body>

<div class="box">
  <h1>WELCOME ADMIN</h1>
  <p>Loading dashboard<span class="dots"></span></p>
</div>

<script>
  // safer redirect
  window.addEventListener("load", () => {
    setTimeout(() => {
      window.location.replace("admin-dashboard.html");
    }, 2500);
  });
</script>

</body>
</html>
