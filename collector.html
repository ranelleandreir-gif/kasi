<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title> Kasipag Collector</title>

<style>
body{
  margin:0;
  font-family:Inter, Arial, sans-serif;
  background:#0b1220;
  color:white;
  min-height:100vh;
  background: radial-gradient(circle at top left, rgba(59,130,246,0.16), transparent 20%),
              radial-gradient(circle at bottom right, rgba(34,197,94,0.16), transparent 18%),
              #0b1220;
}

* { box-sizing: border-box; }

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: radial-gradient(circle at 75% 25%, rgba(255,255,255,0.06), transparent 13%),
              radial-gradient(circle at 20% 80%, rgba(34,197,94,0.08), transparent 12%);
  pointer-events: none;
}

.page {
  width: min(1200px, calc(100% - 32px));
  margin: 0 auto;
  padding: 24px 0 40px;
  opacity: 0;
  transform: translateY(16px);
  animation: pagePop 0.72s ease forwards;
}

.action-overlay {
  position: fixed;
  inset: 0;
  background: rgba(7,11,18,0.74);
  display: grid;
  place-items: center;
  z-index: 50;
  opacity: 0;
  visibility: hidden;
  transition: opacity 0.24s ease, visibility 0.24s ease;
}

.action-overlay.active {
  opacity: 1;
  visibility: visible;
}

.action-popup {
  width: min(420px, calc(100% - 40px));
  padding: 28px 26px;
  border-radius: 28px;
  background: rgba(15,23,42,0.96);
  border: 1px solid rgba(148,163,184,0.16);
  box-shadow: 0 34px 90px rgba(0,0,0,0.35);
  text-align: center;
  animation: popIn 0.28s ease both;
}

.action-popup .spinner {
  width: 52px;
  height: 52px;
  margin: 0 auto 16px;
  border-radius: 50%;
  border: 5px solid rgba(255,255,255,0.14);
  border-top-color: #22c55e;
  animation: spin 0.85s linear infinite;
}

.action-popup strong {
  display: block;
  margin-bottom: 10px;
  font-size: 1.1rem;
}

.action-popup span {
  color: #94a3b8;
  font-size: 0.95rem;
}

@keyframes popIn {
  from { opacity: 0; transform: translateY(12px) scale(0.98); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}

@keyframes pagePop {
  to { opacity: 1; transform: translateY(0); }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.dashboard-grid {
  display: grid;
  grid-template-columns: 260px minmax(0, 1fr);
  gap: 24px;
}

.main-panel {
  display: grid;
  gap: 24px;
}

.sidebar {
  background: rgba(15,23,42,0.96);
  border: 1px solid rgba(148,163,184,0.16);
  border-radius: 24px;
  padding: 24px;
  position: sticky;
  top: 24px;
  min-height: 420px;
}

.sidebar h2 {
  margin: 0 0 20px;
  font-size: 1.1rem;
}

.nav-link {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  border: 1px solid rgba(148,163,184,0.12);
  background: transparent;
  color: white;
  border-radius: 16px;
  padding: 14px 16px;
  margin-bottom: 12px;
  cursor: pointer;
  text-align: left;
  transition: background .2s ease, border-color .2s ease;
}

.nav-link.active {
  background: linear-gradient(135deg, rgba(59,130,246,0.18), rgba(34,197,94,0.14));
  border-color: rgba(59,130,246,0.55);
}

.nav-link:hover {
  border-color: rgba(59,130,246,0.35);
}

.sidebar-summary {
  margin-top: 28px;
  display: grid;
  gap: 12px;
}

.summary-item {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 14px 16px;
  border-radius: 16px;
  background: rgba(255,255,255,0.03);
  border: 1px solid rgba(148,163,184,0.16);
}

.summary-item strong {
  font-size: 0.98rem;
}

/* TOP BAR */
.top{
  padding:24px 24px 20px;
  background:rgba(15,23,42,0.75);
  text-align:center;
  border-radius: 24px;
  border:1px solid rgba(255,255,255,0.08);
  backdrop-filter: blur(20px);
  margin-bottom: 24px;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.top:hover {
  transform: translateY(-1px);
  box-shadow: 0 24px 45px rgba(34,197,94,0.12);
}

.top-brand {
  display: flex;
  align-items: center;
  gap: 18px;
}

.top-brand img {
  width: 72px;
  height: 72px;
  object-fit: contain;
  border-radius: 16px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.35);
}

.top-content {
  display: flex;
  align-items: center;
  min-width: 0;
}

.top-actions {
  display: flex;
  align-items: center;
  justify-content: flex-end;
}

.top-content h1 {
  margin: 0;
  font-size: clamp(2rem, 2.5vw, 2.8rem);
  letter-spacing: -0.04em;
}

.top-actions .logout-btn {
  min-width: 140px;
}

@media (max-width: 860px) {
  .top-brand {
    gap: 14px;
  }

  .top-brand img {
    width: 60px;
    height: 60px;
  }

  .top-content h1 {
    font-size: clamp(1.8rem, 5vw, 2.3rem);
  }
}

@media (max-width: 560px) {
  .top {
    padding: 18px 16px 16px;
  }

  .top-brand {
    flex-direction: column;
    align-items: flex-start;
  }

  .top-brand img {
    width: 52px;
    height: 52px;
  }

  .logout-btn {
    width: 100%;
  }
}

.top-content p {
  margin: 0;
  color: #9ca3af;
  max-width: 720px;
}

.logout-btn {
  background: var(--red);
  color: white;
  border: none;
  border-radius: 12px;
  padding: 10px 16px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

.logout-btn:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 20px rgba(239, 68, 68, 0.3);
}

/* STATS */
.stats{
  display:grid;
  grid-template-columns: repeat(3, minmax(0, 1fr));
  gap:16px;
  margin: 20px 0 0;
}

.box{
  background:rgba(255,255,255,0.08);
  padding:18px 20px;
  border-radius:18px;
  text-align:center;
  border:1px solid rgba(255,255,255,0.08);
  transition: transform 0.26s ease, box-shadow 0.26s ease;
}

.box:hover {
  transform: translateY(-2px);
  box-shadow: 0 20px 45px rgba(0,0,0,0.18);
}

.box strong {
  display: block;
  font-size: 1.9rem;
  margin-bottom: 8px;
  color: #fff;
}

.box span {
  color: #9ca3af;
}

/* LIST */
#assignedList,
#collectList {
  padding-bottom: 22px;
  display: grid;
  gap: 16px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.05);
  padding:18px;
  border-radius:16px;
  backdrop-filter:blur(10px);
  border: 1px solid rgba(255,255,255,0.08);
  transition: transform 0.22s ease, box-shadow 0.22s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 34px rgba(0,0,0,0.24);
}

.item-title {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
  margin-bottom: 12px;
}

.item-title h3 {
  margin: 0;
  font-size: 1.05rem;
}

.row {
  display: flex;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 8px;
  font-size: 0.9rem;
  color: #cbd5e1;
}

.row:last-child {
  margin-bottom: 0;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  font-size: 0.88rem;
}

.badge.collected {
  background: rgba(34,197,94,0.18);
  color: #a7f3d0;
}

.badge.unpaid {
  background: rgba(239,68,68,0.18);
  color: #fca5a5;
}

/* BUTTONS */
button{
  width:48%;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
  transition: transform .18s ease, box-shadow .18s ease;
}

select {
  width: 100%;
  padding: 10px 12px;
  border-radius: 10px;
  border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.06);
  color: white;
  margin-top: 8px;
}

button:hover {
  transform: translateY(-1px);
  filter: brightness(1.05);
}

.collected{background:#10b981;color:white;}
.unpaid{background:#ef4444;color:white;}

@media (max-width: 900px) {
  .page {
    width: calc(100% - 24px);
    padding: 20px 12px 32px;
  }

  .dashboard-grid {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    top: auto;
  }

  .stats {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 640px) {
  .dashboard-grid {
    grid-template-columns: 1fr;
  }

  .sidebar {
    position: static;
    top: auto;
    min-height: auto;
  }

  .top {
    flex-wrap: wrap;
  }

  .top-content {
    width: 100%;
  }

  .top-actions {
    width: 100%;
    margin-top: 16px;
    justify-content: flex-start;
  }

  .item-title {
    flex-direction: column;
    align-items: flex-start;
  }

  .item-title h3 {
    font-size: 1rem;
  }

  .row {
    flex-direction: column;
    gap: 10px;
  }

  button {
    width: 100%;
  }

  select {
    width: 100%;
  }
}

.hidden {
  display: none !important;
}

button {
  transition: transform 0.2s ease, filter 0.2s ease;
}

@keyframes floatIn {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}

@media (max-width: 520px) {
  .top {
    padding: 16px 12px;
  }

  .card {
    padding: 16px;
  }

  .stats {
    gap: 12px;
  }

  .sidebar {
    padding: 18px;
  }

  .summary-item {
    padding: 12px 14px;
  }
}
</style>
</head>

<body>

<div class="page">
  <div id="actionOverlay" class="action-overlay" aria-live="polite" aria-hidden="true">
    <div class="action-popup">
      <div class="spinner"></div>
      <strong id="actionTitle">Processing...</strong>
      <span id="actionMessage">Please wait while the system updates your dashboard.</span>
    </div>
  </div>

  <div class="dashboard-grid">
    <aside class="sidebar">
      <h2>Collector Menu</h2>
      <button id="assignedTabBtn" class="nav-link active" onclick="showCollectorTab('assigned')">Assigned Loans</button>
      <button id="collectTabBtn" class="nav-link" onclick="showCollectorTab('collect')">Collect & Assign</button>
      <div class="sidebar-summary">
        <div class="summary-item"><strong>Total</strong><span id="sideTotal">0</span></div>
        <div class="summary-item"><strong>Collected</strong><span id="sideCollected">0</span></div>
        <div class="summary-item"><strong>Unpaid</strong><span id="sideUnpaid">0</span></div>
      </div>
    </aside>

    <div class="main-panel">
      <div class="top">
        <div class="top-content">
          <div class="top-brand">
            <img src="logopo.png" alt="Kasipag Logo">
            <div>
              <h1>Kasipag Collector</h1>
              <p>“To HELP, to CREATE and to PROVIDE”</p>
              <p class="subtext">Logged in as <strong id="collectorName">Collector</strong></p>
            </div>
          </div>
        </div>
        <div class="top-actions">
          <button class="logout-btn" onclick="loadTasks()">🔄 Refresh</button>
          <button class="logout-btn" onclick="logout()">🚪 Sign Out</button>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats">
    <div class="box">
      <strong id="total">0</strong>
      <span>Total Loans</span>
    </div>

    <div class="box">
      <strong id="collected">0</strong>
      <span>Collected</span>
    </div>

    <div class="box">
      <strong id="unpaid">0</strong>
      <span>Unpaid</span>
    </div>
  </div>

  <!-- LIST -->
  <div id="assignedList"></div>
  <div id="collectList" class="hidden"></div>
    </div>
  </div>
</div>

<script type="module">
import { db, auth } from "./firebase.js";
import {
  collection,
  query,
  where,
  onSnapshot,
  doc,
  updateDoc,
  serverTimestamp,
  getDocs,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";
import { signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

let cashiers = [];

window.showCollectorTab = (tab) => {
  const assignedBtn = document.getElementById("assignedTabBtn");
  const collectBtn = document.getElementById("collectTabBtn");
  const assignedList = document.getElementById("assignedList");
  const collectList = document.getElementById("collectList");

  if (tab === "collect") {
    assignedList.classList.add("hidden");
    collectList.classList.remove("hidden");
    assignedBtn.classList.remove("active");
    collectBtn.classList.add("active");
  } else {
    assignedList.classList.remove("hidden");
    collectList.classList.add("hidden");
    assignedBtn.classList.add("active");
    collectBtn.classList.remove("active");
  }
};

async function loadCashiers() {
  const usersSnap = await getDocs(collection(db, "users"));
  cashiers = [];
  usersSnap.forEach(d => {
    const u = d.data();
    if (u.role === "cashier" && u.status === "approved" && !u.deleted) {
      cashiers.push({
        id: d.id,
        name: u.assignedName || u.name || u.email
      });
    }
  });
}

function cashierOptions(loan) {
  if (cashiers.length === 0) {
    return "<option value=''>No cashier available</option>";
  }

  let options = "<option value=''>Select a cashier</option>";
  cashiers.forEach(c => {
    const selected = loan.assignedCashierId === c.id ? "selected" : "";
    options += `<option value="${c.id}" ${selected}>${c.name}</option>`;
  });
  return options;
}

let collectorId = null;

function loadTasks() {
  if (!collectorId) {
    console.warn("collectorId not set yet");
    return;
  }

  console.log("Loading tasks for collector:", collectorId);

  // First try to get all loans to see if we can read them
  const q = query(collection(db, "loans"));

  onSnapshot(q, async (snap) => {
  console.log("Snapshot received with", snap.size, "total loans");
  
  // Filter loans for this collector
  const collectorLoans = [];
  snap.forEach(d => {
    const data = d.data();
    if (data.deleted) return; // Skip deleted loans
    if (data.assignedCollectorId === collectorId && data.balance > 0 && (data.status === "assigned" || data.status === "unpaid")) {
      collectorLoans.push({ id: d.id, ...data });
    }
  });
  
  console.log("Found", collectorLoans.length, "loans for this collector");
  
  await loadCashiers();

  let total = 0;
  let collected = 0;
  let unpaid = 0;

  const assignedList = document.getElementById("assignedList");
  const collectList = document.getElementById("collectList");
  assignedList.innerHTML="";
  collectList.innerHTML="";

  collectorLoans.forEach(data => {
    console.log("Processing loan:", data.id, "Status:", data.status, "Balance:", data.balance);
    
    total++;

    if(data.status==="unpaid") unpaid++;

    if (data.status === "assigned") {
      // ===== ASSIGNED LOANS TAB =====
      const assignedCard = document.createElement("div");
      assignedCard.className = "card";
      assignedCard.innerHTML = `
        <h3>${data.borrowerName}</h3>
        <p> Remaining Balance: <strong>₱${data.balance}</strong></p>
        <p>📍 ${data.address || "No address"}</p>
        <p>Status: ${data.status}</p>
        <p>Type: <strong>${data.loanType || 'solo'}</strong> ${data.memberNames && data.memberNames.length > 0 ? `| Members: ${data.memberNames.join(', ')}` : ''}</p>
        <p>Cashier: <strong>${data.assignedCashierName || "Not assigned"}</strong></p>
        <div class="row">
          <label for="cashier-${data.id}" class="select-label">Choose cashier:</label>
          <select id="cashier-${data.id}">${cashierOptions(data)}</select>
        </div>
        <div class="row">
          <button class="collected">👤 Assign to Cashier</button>
        </div>
      `;
      
      assignedCard.querySelector(".collected").onclick = async () => {
        const select = assignedCard.querySelector(`#cashier-${data.id}`);
        const selectedId = select?.value;
        const selectedCashier = cashiers.find(c => c.id === selectedId);

        if (cashiers.length > 0 && !selectedId) {
          alert("Please select a cashier before assigning.");
          return;
        }

        await updateDoc(doc(db, "loans", data.id), {
          status: "collected",
          collectedAt: serverTimestamp(),
          assignedCashierId: selectedCashier?.id || null,
          assignedCashierName: selectedCashier?.name || ""
          // Keep current balance - cashier will deduct later
        });
      };
      
      assignedList.appendChild(assignedCard);
      
    } else if (data.status === "unpaid") {
      // ===== COLLECT LOANS TAB (For Retries) =====
      const card = document.createElement("div");
      card.className="card";

      card.innerHTML=`
        <h3>${data.borrowerName}</h3>
        <p> Remaining Balance: <strong>₱${data.balance}</strong></p>
        <p>📍 ${data.address || "No address"}</p>
        <p>Status: ${data.status}</p>
        <p>Type: <strong>${data.loanType || 'solo'}</strong> ${data.memberNames && data.memberNames.length > 0 ? `| Members: ${data.memberNames.join(', ')}` : ''}</p>
        <p>Cashier: <strong>${data.assignedCashierName || "Not assigned"}</strong></p>
        <div class="row">
          <label for="cashier-${data.id}" class="select-label">Choose cashier:</label>
          <select id="cashier-${data.id}">${cashierOptions(data)}</select>
        </div>
        <div class="row">
          <button class="collected">👤 Assign to Cashier</button>
          <button class="unpaid">❌ Unpaid</button>
        </div>
      `;

      card.querySelector(".collected").onclick = async () => {
        const select = card.querySelector(`#cashier-${data.id}`);
        const selectedId = select?.value;
        const selectedCashier = cashiers.find(c => c.id === selectedId);

        if (cashiers.length > 0 && !selectedId) {
          alert("Please select a cashier before assigning.");
          return;
        }

        await updateDoc(doc(db, "loans", data.id), {
          status: "collected",
          collectedAt: serverTimestamp(),
          assignedCashierId: selectedCashier?.id || null,
          assignedCashierName: selectedCashier?.name || ""
          // Keep current balance - cashier will deduct later
        });
      };

      card.querySelector(".unpaid").onclick = async ()=>{
        await updateDoc(doc(db,"loans",data.id),{
          status:"unpaid"
        });
      };
      
      collectList.appendChild(card);
    }
  });

  // Add empty states if needed
  if (assignedList.children.length === 0) {
    assignedList.innerHTML = `<div class="empty-state">No assigned loans. Wait for admin to assign loans.</div>`;
  }
  if (collectList.children.length === 0) {
    collectList.innerHTML = `<div class="empty-state">No loans to collect yet.</div>`;
  }

  /* UPDATE STATS */
  document.getElementById("total").innerText=total;
  document.getElementById("collected").innerText=collected;
  document.getElementById("unpaid").innerText=unpaid;
  document.getElementById("sideTotal").innerText=total;
  document.getElementById("sideCollected").innerText=collected;
  document.getElementById("sideUnpaid").innerText=unpaid;

});
}

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    window.location.href = "login.html";
    return;
  }

  collectorId = user.uid;
  console.log("Collector authenticated with ID:", collectorId, "email:", user.email);
  const userSnap = await getDoc(doc(db, "users", collectorId));
  if (!userSnap.exists()) {
    console.error("User document does not exist for collectorId:", collectorId);
    alert("Collector access only.");
    window.location.href = "login.html";
    return;
  }
  
  const userData = userSnap.data();
  console.log("User data:", userData);
  if (userData.role !== "collector") {
    console.error("User role is not collector:", userData.role);
    alert("Collector access only.");
    window.location.href = "login.html";
    return;
  }

  const collectorNameEl = document.getElementById("collectorName");
  if (collectorNameEl) {
    collectorNameEl.textContent = userData.assignedName || userData.name || "Collector";
  }

  loadTasks();
});

// 🔥 SET OFFLINE ON PAGE UNLOAD
window.addEventListener('beforeunload', async () => {
  const uid = localStorage.getItem("uid");
  if (uid) {
    await updateDoc(doc(db, "users", uid), {
      online: false,
      lastSeen: serverTimestamp()
    });
  }
});

window.logout = async () => {
  const uid = localStorage.getItem("uid");
  if (uid) {
    await updateDoc(doc(db, "users", uid), {
      online: false,
      lastSeen: serverTimestamp()
    });
  }
  localStorage.removeItem("uid");
  localStorage.removeItem("role");
  localStorage.removeItem("assignedName");
  localStorage.removeItem("email");
  await signOut(auth);
  window.location.href = "role-selector.html";
};;
</script>

</body>
</html>
