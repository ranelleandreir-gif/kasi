<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Collector Final Boss</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP BAR */
.top{
  padding:15px;
  background:rgba(255,255,255,0.05);
  text-align:center;
}

/* STATS */
.stats{
  display:flex;
  justify-content:space-around;
  padding:10px;
}

.box{
  background:rgba(255,255,255,0.06);
  padding:10px;
  border-radius:10px;
  text-align:center;
  width:30%;
}

/* LIST */
#list{
  padding:10px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:12px;
  backdrop-filter:blur(10px);
}

/* BUTTONS */
button{
  width:48%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.collected{background:#10b981;color:white;}
.unpaid{background:#ef4444;color:white;}

.row{
  display:flex;
  justify-content:space-between;
  margin-top:10px;
}
</style>
</head>

<body>

<div class="top">
  <h2>💀 FINAL BOSS COLLECTOR</h2>
</div>

<!-- STATS -->
<div class="stats">
  <div class="box">
    <h3 id="total">0</h3>
    <p>Total</p>
  </div>

  <div class="box">
    <h3 id="collected">0</h3>
    <p>Collected</p>
  </div>

  <div class="box">
    <h3 id="unpaid">0</h3>
    <p>Unpaid</p>
  </div>
</div>

<!-- LIST -->
<div id="list"></div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  query,
  where,
  onSnapshot,
  doc,
  updateDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 👤 COLLECTOR ID */
const collectorId = localStorage.getItem("uid");

/* QUERY ONLY ASSIGNED */
const q = query(
  collection(db,"loans"),
  where("assignedCollectorId","==",collectorId)
);

/* REAL TIME SYSTEM */
onSnapshot(q,(snap)=>{

  let total=0;
  let collected=0;
  let unpaid=0;

  const list = document.getElementById("list");
  list.innerHTML="";

  snap.forEach(d=>{

    const data = d.data();
    total++;

    if(data.status==="collected") collected++;
    if(data.status==="unpaid") unpaid++;

    const card = document.createElement("div");
    card.className="card";

    card.innerHTML=`
      <h3>${data.borrowerName}</h3>
      <p>💰 ₱${data.amount}</p>
      <p>📍 ${data.address || "No address"}</p>
      <p>Status: ${data.status}</p>

      <div class="row">
        <button class="collected">✔ Collected</button>
        <button class="unpaid">❌ Unpaid</button>
      </div>
    `;

    /* ✔ COLLECTED */
    card.querySelector(".collected").onclick = async ()=>{
      await updateDoc(doc(db,"loans",d.id),{
        status:"collected",
        collectedAt:serverTimestamp()
      });
    };

    /* ❌ UNPAID */
    card.querySelector(".unpaid").onclick = async ()=>{
      await updateDoc(doc(db,"loans",d.id),{
        status:"unpaid"
      });
    };

    list.appendChild(card);
  });

  /* UPDATE STATS */
  document.getElementById("total").innerText=total;
  document.getElementById("collected").innerText=collected;
  document.getElementById("unpaid").innerText=unpaid;

});
</script>

</body>
</html>
