<!DOCTYPE html>
<html>
<head>
<title>Collector Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  padding:20px;
  background:#111827;
}

.card{
  margin:10px;
  padding:15px;
  background:rgba(255,255,255,0.08);
  border-radius:10px;
}

button{
  margin:5px;
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.collected{background:#10b981;color:white;}
.unpaid{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="header">
  <h2>📦 My Collections</h2>
</div>

<div id="list"></div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  doc,
  updateDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const currentCollector = localStorage.getItem("assignedName");
const list = document.getElementById("list");

onSnapshot(collection(db, "loans"), (snap) => {

  list.innerHTML = "";

  snap.forEach(docSnap => {

    const d = docSnap.data();

    if (d.collector === currentCollector) {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <h3>${d.borrowerName}</h3>
        <p>💰 ${d.amount}</p>
        <p>📍 ${d.address || ""}</p>
        <p>Status: ${d.status}</p>

        <button class="collected">Collected</button>
        <button class="unpaid">Unpaid</button>
      `;

      // ✔ MARK COLLECTED
      div.querySelector(".collected").onclick = async () => {
        await updateDoc(doc(db, "loans", docSnap.id), {
          status: "collected"
        });
      };

      // ❌ MARK UNPAID
      div.querySelector(".unpaid").onclick = async () => {
        await updateDoc(doc(db, "loans", docSnap.id), {
          status: "unpaid"
        });
      };

      list.appendChild(div);
    }
  });
});
</script>

</body>
</html>
