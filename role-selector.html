<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Portal</title>

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:#0b1220;
  color:white;
  font-family:Arial;
}

.box{
  text-align:center;
}

button{
  display:block;
  width:200px;
  margin:10px auto;
  padding:12px;
  border:none;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.admin{background:#ef4444;color:white;}
.cashier{background:#3b82f6;color:white;}
.collector{background:#22c55e;color:white;}
</style>

</head>
<body>

<div class="box">
  <h2>Choose Portal</h2>

  <button class="admin" onclick="selectRole('admin')">Admin</button>
  <button class="cashier" onclick="selectRole('cashier')">Cashier</button>
  <button class="collector" onclick="selectRole('collector')">Collector</button>
</div>

<script>
function selectRole(role){
  localStorage.setItem("selectedRole", role);
  window.location.href = "login.html";
}
</script>

</body>
</html>
