<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kasipag Login</title>

<style>
:root {
  color-scheme: dark;
  font-family: Inter, Arial, sans-serif;
  background: #091019;
  color: #e5e7eb;
}

* {
  box-sizing: border-box;
}

body {
  margin: 0;
  min-height: 100vh;
  display: grid;
  place-items: center;
  background: radial-gradient(circle at top left, rgba(34,197,94,0.18), transparent 25%),
              radial-gradient(circle at bottom right, rgba(59,130,246,0.18), transparent 20%),
              linear-gradient(180deg, #09101c 0%, #071018 100%);
}

body::before {
  content: "";
  position: fixed;
  inset: 0;
  background: url('data:image/svg+xml,%3Csvg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg"%3E%3Ccircle cx="100" cy="100" r="100" fill="rgba(255%2C255%2C255%2C0.03)"/%3E%3C/svg%3E') center/500px no-repeat;
  pointer-events: none;
}

.page {
  width: min(420px, calc(100% - 32px));
  padding: 32px;
}

.auth-card {
  position: relative;
  background: rgba(15,23,42,0.88);
  border: 1px solid rgba(148,163,184,0.12);
  box-shadow: 0 30px 80px rgba(0,0,0,0.35);
  border-radius: 28px;
  overflow: hidden;
  backdrop-filter: blur(20px);
}

.auth-card::before {
  content: "";
  position: absolute;
  inset: 0;
  background: linear-gradient(135deg, rgba(59,130,246,0.2), transparent 35%),
              linear-gradient(225deg, rgba(34,197,94,0.18), transparent 32%);
  pointer-events: none;
}

.auth-inner {
  position: relative;
  padding: 32px;
}

.auth-title {
  display: flex;
  gap: 16px;
  align-items: center;
  margin-bottom: 24px;
}

.auth-title-icon {
  width: 56px;
  height: 56px;
  border-radius: 18px;
  background: linear-gradient(135deg, #22c55e, #3b82f6);
  display: grid;
  place-items: center;
  font-size: 1.7rem;
  color: white;
}

.auth-title-text h1 {
  margin: 0;
  font-size: 1.85rem;
}

.auth-title-text p {
  margin: 8px 0 0;
  color: #9ca3af;
}

.input-group {
  display: grid;
  gap: 14px;
}

input {
  width: 100%;
  padding: 16px 18px;
  border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  background: rgba(15,23,42,0.95);
  color: #e5e7eb;
  outline: none;
  transition: border-color 0.2s ease, transform 0.2s ease;
}

input:focus {
  border-color: rgba(59,130,246,0.8);
  transform: translateY(-1px);
}

button {
  width: 100%;
  border: none;
  border-radius: 16px;
  padding: 16px 20px;
  font-size: 1rem;
  font-weight: 700;
  color: #071018;
  background: linear-gradient(135deg, #22c55e, #3b82f6);
  cursor: pointer;
  box-shadow: 0 18px 30px rgba(34,197,94,0.18);
  transition: transform 0.2s ease, box-shadow 0.2s ease;
}

button:hover {
  transform: translateY(-2px);
  box-shadow: 0 22px 36px rgba(34,197,94,0.22);
}

.status-row {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 12px;
  align-items: center;
  margin-top: 18px;
}

.loader {
  display: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 4px solid rgba(255,255,255,0.14);
  border-top-color: #22c55e;
  animation: spin 0.9s linear infinite;
}

@keyframes spin { to { transform: rotate(360deg); } }

#msg {
  color: #f8fafc;
  min-height: 1.2rem;
  font-size: 0.98rem;
}

.support {
  margin: 22px 0 8px;
  color: #94a3b8;
  text-align: center;
}

.link {
  display: block;
  text-align: center;
  color: #3b82f6;
  text-decoration: none;
  font-weight: 600;
}

.link:hover {
  text-decoration: underline;
}
</style>
</head>
<body>
<div class="page">
  <div class="auth-card">
    <div class="auth-inner">
      <div class="auth-title">
        <div class="auth-title-icon">💼</div>
        <div class="auth-title-text">
          <h1>Kasipag Login</h1>
          <p>Access your cashier, collector, or admin dashboard securely.</p>
        </div>
      </div>

      <div class="input-group">
        <input type="email" id="email" placeholder="Email address" autocomplete="username">
        <input type="password" id="password" placeholder="Password" autocomplete="current-password">
      </div>

      <button id="loginBtn">Sign In</button>

      <div class="status-row">
        <div class="loader" id="loader"></div>
        <div id="msg"></div>
      </div>

      <p class="support">Not registered yet? Choose your portal, then create your account.</p>
      <a class="link" href="role-selector.html">Go to portal selector</a>
    </div>
  </div>
</div>

<script type="module" src="login.js"></script>
</body>
</html>
