<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cashier Pro System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#111827);
  color:white;
}

/* HEADER */
.header{
  padding:20px;
  text-align:center;
}

/* LAYOUT */
.container{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
  padding:20px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  backdrop-filter:blur(10px);
  padding:20px;
  border-radius:15px;
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border:none;
  border-radius:8px;
}

/* BUTTON */
button{
  width:100%;
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

button:hover{
  background:#3b82f6;
}

/* LIST */
.item{
  background:rgba(255,255,255,0.05);
  padding:10px;
  margin:8px 0;
  border-radius:8px;
}
</style>
</head>

<body>

<div class="header">
  <h1>💰 CASHIER SYSTEM PRO</h1>
  <p>Confirm Payments from Collectors</p>
</div>

<div class="container">

  <!-- COLLECTED LOANS -->
  <div class="card">
    <h2>📦 Collected by Riders</h2>
    <div id="loansList"></div>
  </div>

  <!-- PAYMENT HISTORY -->
  <div class="card">
    <h2>📜 Payment History</h2>
    <div id="paymentsList"></div>
  </div>

</div>

<script type="module">
import { db, auth } from "./firebase.js";
import {
  collection,
  addDoc,
  updateDoc,
  doc,
  getDoc,
  onSnapshot,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

import { onAuthStateChanged } 
from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

/* CASHIER INFO */
let cashierName = "";
let cashierId = "";

/* AUTH CHECK */
onAuthStateChanged(auth, async (user)=>{
  if(!user){
    window.location.href="login.html";
    return;
  }

  cashierId = user.uid;

  const snap = await getDoc(doc(db,"users",user.uid));
  if (snap.exists()) {
    cashierName = snap.data().assignedName || snap.data().name || "Cashier";
  }

  loadLoans();
  loadPayments();
});

/* =========================
   📦 LOAD COLLECTED LOANS
========================= */
function loadLoans(){

  onSnapshot(collection(db,"loans"), (snap)=>{

    const loansDiv = document.getElementById("loansList");
    if(!loansDiv) return;

    loansDiv.innerHTML = "";

    snap.forEach(d=>{

      const l = d.data();

      // Show only COLLECTED loans
      if(l.status !== "collected") return;

      const div = document.createElement("div");
      div.className = "item";

      div.innerHTML = `
        <b>👤 ${l.borrowerName}</b><br>
        💰 Amount: ₱${l.amount}<br>
        💵 Balance: ₱${l.balance}<br>
        🚚 Collector: ${l.assignedCollectorName || "N/A"}<br>
        📍 Address: ${l.address || "N/A"}<br><br>
        
        <input type="number" placeholder="Enter amount paid" id="pay-${d.id}" min="0" max="${l.balance}" style="width:100%; padding:8px; margin:8px 0; border-radius:6px; border:none;"><br>
        
        <button onclick="payLoan('${d.id}','${l.borrowerName}',${l.balance})" style="width:100%; padding:10px; margin:8px 0; background:#10b981; border:none; border-radius:6px; color:white; cursor:pointer; font-weight:bold;">
          ✔ Confirm Payment
        </button>
      `;

      loansDiv.appendChild(div);
    });

    if(loansDiv.innerHTML === "") {
      loansDiv.innerHTML = "<p>📭 No collected loans to confirm</p>";
    }
  });
}

/* =========================
   💰 PAY LOAN FUNCTION
========================= */
window.payLoan = async (loanId, borrowerName, currentBalance) => {

  const input = document.getElementById("pay-" + loanId);
  const amountPaid = Number(input.value);

  if(!amountPaid || amountPaid <= 0) {
    alert("Enter valid amount");
    return;
  }

  if(amountPaid > currentBalance) {
    alert(`Cannot pay more than balance (₱${currentBalance})`);
    return;
  }

  const newBalance = currentBalance - amountPaid;

  try {
    const loanRef = doc(db, "loans", loanId);

    /* UPDATE LOAN BALANCE */
    await updateDoc(loanRef, {
      balance: newBalance,
      status: newBalance === 0 ? "paid" : "collected",
      confirmedAt: serverTimestamp(),
      confirmedById: cashierId
    });

    /* SAVE PAYMENT HISTORY */
    await addDoc(collection(db, "payments"), {
      loanId,
      borrowerName,
      amountPaid,
      remainingBalance: newBalance,
      cashierId,
      cashierName,
      createdAt: serverTimestamp()
    });

    alert(`✅ Payment confirmed! Remaining: ₱${newBalance}`);
    input.value = "";
  } catch(error) {
    alert("Error: " + error.message);
  }
};

/* =========================
   📊 LOAD PAYMENT HISTORY
========================= */
function loadPayments(){

  onSnapshot(collection(db, "payments"), (snap)=>{

    const div = document.getElementById("paymentsList");
    if(!div) return;

    div.innerHTML = "";

    snap.forEach(d=>{

      const p = d.data();

      const item = document.createElement("div");
      item.className = "item";

      item.innerHTML = `
        👤 ${p.borrowerName}<br>
        💰 Paid: ₱${p.amountPaid}<br>
        📉 Balance: ₱${p.remainingBalance}<br>
        👨‍💼 Cashier: ${p.cashierName}<br>
        ⏰ ${new Date(p.createdAt.toDate()).toLocaleString()}
      `;

      div.appendChild(item);
    });
  });
}

</script>
        <b>${p.borrowerName}</b><br>
        Paid: ₱${p.amountPaid}<br>
        Balance: ₱${p.remainingBalance}<br>
        Cashier: ${p.cashierName}<br>
      `;

      div.appendChild(item);
    });

  });
}

</script>

</body>
</html>
