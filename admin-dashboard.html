<!DOCTYPE html>
<html>
<head>
<title>Admin Pro System</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0f172a;
  color:white;
}

.header{
  padding:20px;
  background:#111827;
  display:flex;
  justify-content:space-between;
}

.cards{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:12px;
  padding:20px;
}

.card{
  background:rgba(255,255,255,0.08);
  padding:15px;
  border-radius:10px;
}

.user{
  background:rgba(255,255,255,0.06);
  margin:10px 20px;
  padding:15px;
  border-radius:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.approve{background:#10b981;color:white;}
.reject{background:#ef4444;color:white;}
</style>
</head>

<body>

<div class="header">
  <h2>📊 Admin Dashboard</h2>
</div>

<div class="cards">
  <div class="card">👤 Total: <span id="total">0</span></div>
  <div class="card">⏳ Pending: <span id="pending">0</span></div>
  <div class="card">✅ Approved: <span id="approved">0</span></div>
  <div class="card">💰 Cashiers: <span id="cashier">0</span></div>
  <div class="card">📦 Collectors: <span id="collector">0</span></div>
</div>

<div id="users"></div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  doc,
  updateDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const usersDiv = document.getElementById("users");

let total=0, pending=0, approved=0, cashier=0, collector=0;

/* REAL TIME USERS */
onSnapshot(collection(db,"users"), (snap)=>{

  usersDiv.innerHTML="";

  total=0; pending=0; approved=0; cashier=0; collector=0;

  snap.forEach(d=>{

    const u=d.data();
    total++;

    if(u.status==="pending") pending++;
    if(u.status==="approved") approved++;

    if(u.role==="cashier" && u.status==="approved") cashier++;
    if(u.role==="collector" && u.status==="approved") collector++;

    const div=document.createElement("div");
    div.className="user";

    div.innerHTML=`
      <div>
        <b>${u.name}</b><br>
        ${u.email}<br>
        ${u.role} | ${u.status}<br>
        ${u.assignedName || "-"}
      </div>

      <div>
        <button class="approve" onclick="approveUser('${d.id}','${u.role}')">Approve</button>
        <button class="reject" onclick="rejectUser('${d.id}')">Reject</button>
      </div>
    `;

    usersDiv.appendChild(div);
  });

  document.getElementById("total").innerText=total;
  document.getElementById("pending").innerText=pending;
  document.getElementById("approved").innerText=approved;
  document.getElementById("cashier").innerText=cashier;
  document.getElementById("collector").innerText=collector;
});

/* AUTO ASSIGN */
window.approveUser = async (id, role)=>{

  const snap = await getDocs(collection(db,"users"));

  let count=0;

  snap.forEach(d=>{
    const u=d.data();
    if(u.role===role && u.status==="approved") count++;
  });

  const assigned = role + (count+1);

  await updateDoc(doc(db,"users",id),{
    status:"approved",
    assignedName:assigned
  });
};

window.rejectUser = async (id)=>{
  await updateDoc(doc(db,"users",id),{
    status:"rejected"
  });
};

</script>

</body>
</html>
