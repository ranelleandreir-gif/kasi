<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Dashboard</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

h1{
  text-align:center;
  padding:20px;
}

.container{
  display:flex;
  gap:20px;
  padding:20px;
}

.box{
  flex:1;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:10px;
}

.stats{
  display:grid;
  grid-template-columns: repeat(2, 1fr);
  gap:10px;
  margin:20px;
}

.stats div{
  background:rgba(255,255,255,0.08);
  padding:10px;
  border-radius:8px;
}

</style>
</head>

<body>

<h1>👑 ADMIN CONTROL PANEL</h1>

<div class="container">
  <div class="box" id="users"></div>
  <div class="box" id="tasks"></div>
</div>

<script type="module" src="./admin.js"></script>

<h2>📊 Admin Analytics</h2>

<div class="stats">
  <div>Total Users: <span id="totalUsers">0</span></div>
  <div>Pending: <span id="pending">0</span></div>
  <div>Approved: <span id="approved">0</span></div>
  <div>Cashiers: <span id="cashiers">0</span></div>
  <div>Collectors: <span id="collectors">0</span></div>
</div>

<canvas id="chart" width="400" height="200"></canvas>

</body>
</html>
