<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Final Boss</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* HEADER */
.header{
  padding:15px;
  text-align:center;
  background:rgba(255,255,255,0.05);
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  padding:10px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.06);
  padding:15px;
  border-radius:12px;
}

/* LIST */
.list{
  padding:10px;
}

/* ITEM */
.item{
  background:rgba(255,255,255,0.06);
  padding:12px;
  margin:8px 0;
  border-radius:10px;
}

/* BUTTONS */
button{
  padding:6px 10px;
  margin:3px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.approve{background:#10b981;color:white;}
.reject{background:#ef4444;color:white;}
.blue{background:#3b82f6;color:white;}
</style>
</head>

<body>

<div class="header">
  <h2>💀 ADMIN FINAL BOSS SYSTEM</h2>
</div>

<!-- DASHBOARD -->
<div class="grid">
  <div class="card">👤 Users <h2 id="totalUsers">0</h2></div>
  <div class="card">⏳ Pending <h2 id="pending">0</h2></div>
  <div class="card">✅ Approved <h2 id="approved">0</h2></div>
  <div class="card">💰 Cashiers <h2 id="cashiers">0</h2></div>
  <div class="card">📦 Collectors <h2 id="collectors">0</h2></div>
</div>

<h3 style="padding:10px;">👤 USERS</h3>
<div id="users"></div>

<h3 style="padding:10px;">📦 LOANS</h3>
<div id="loans"></div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  getDocs,
  addDoc,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   👤 USERS REAL TIME
========================= */
onSnapshot(collection(db,"users"), (snap)=>{

  let total=0, pending=0, approved=0, cashiers=0, collectors=0;

  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML="";

  snap.forEach(d=>{
    const u=d.data();
    total++;

    if(u.status==="pending") pending++;
    if(u.status==="approved") approved++;
    if(u.role==="cashier") cashiers++;
    if(u.role==="collector") collectors++;

    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <b>${u.name}</b><br>
      ${u.email}<br>
      Role: ${u.role} | ${u.status}<br>
      Assigned: ${u.assignedName || "-"}

      <br><br>
      <button class="approve" onclick="approveUser('${d.id}','${u.role}')">Approve</button>
      <button class="reject" onclick="rejectUser('${d.id}')">Reject</button>
      <button class="blue" onclick="setRole('${d.id}','collector')">Collector</button>
      <button class="blue" onclick="setRole('${d.id}','cashier')">Cashier</button>
    `;

    usersDiv.appendChild(div);
  });

  document.getElementById("totalUsers").innerText=total;
  document.getElementById("pending").innerText=pending;
  document.getElementById("approved").innerText=approved;
  document.getElementById("cashiers").innerText=cashiers;
  document.getElementById("collectors").innerText=collectors;
});


/* =========================
   📦 LOANS REAL TIME
========================= */
onSnapshot(collection(db,"loans"), (snap)=>{

  const loansDiv=document.getElementById("loans");
  loansDiv.innerHTML="";

  snap.forEach(d=>{
    const l=d.data();

    const div=document.createElement("div");
    div.className="item";

    div.innerHTML=`
      <b>👤 ${l.borrowerName}</b><br>
      💰 ₱${l.amount} | Balance ₱${l.balance}<br>
      📦 ${l.status}<br>
      👷 ${l.assignedCollectorName || "-"}

      <br><br>
      <button class="approve" onclick="markPaid('${d.id}')">Mark Paid</button>
      <button class="reject" onclick="deleteLoan('${d.id}')">Delete</button>
    `;

    loansDiv.appendChild(div);
  });

});


/* =========================
   🔥 ACTIONS
========================= */

window.approveUser = async (id, role)=>{

  const snap = await getDocs(collection(db,"users"));

  let count=0;

  snap.forEach(d=>{
    const u=d.data();
    if(u.role===role && u.status==="approved") count++;
  });

  const name = role==="cashier"
    ? `cashier${count+1}`
    : `collector${count+1}`;

  await updateDoc(doc(db,"users",id),{
    status:"approved",
    assignedName:name
  });
};

window.rejectUser = async (id)=>{
  await updateDoc(doc(db,"users",id),{
    status:"rejected"
  });
};

window.setRole = async (id,role)=>{
  await updateDoc(doc(db,"users",id),{
    role
  });
};

window.deleteLoan = async (id)=>{
  await deleteDoc(doc(db,"loans",id));
};

window.markPaid = async (id)=>{
  await updateDoc(doc(db,"loans",id),{
    status:"paid",
    balance:0
  });
};

</script>

<h3 style="padding:10px;">➕ CREATE LOAN</h3>

<div style="padding:10px;">

  <input id="borrowerName" placeholder="Borrower Name" style="padding:8px;width:200px;">
  <input id="amount" placeholder="Amount" style="padding:8px;width:200px;">

  <br><br>

  <select id="collectorSelect" style="padding:8px;width:210px;">
    <option value="">Select Collector</option>
  </select>

  <br><br>

  <button class="blue" onclick="createLoan()">Create Loan</button>

</div>


</body>
</html>
