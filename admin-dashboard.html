<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin System Pro</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b1220;
  color:white;
}

/* TOP MENU (FOLDERS STYLE) */
.tabs{
  display:flex;
  gap:10px;
  padding:10px;
  background:rgba(255,255,255,0.05);
}

.tab{
  padding:10px 15px;
  background:rgba(255,255,255,0.08);
  border-radius:8px;
  cursor:pointer;
}

.tab.active{
  background:#3b82f6;
}

/* SECTIONS */
.section{
  display:none;
  padding:10px;
}

.section.active{
  display:block;
}

/* CARDS */
.card{
  background:rgba(255,255,255,0.06);
  padding:12px;
  margin:10px 0;
  border-radius:10px;
}

/* BUTTONS */
button{
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  margin:3px;
}

.blue{background:#3b82f6;color:white;}
.green{background:#10b981;color:white;}
.red{background:#ef4444;color:white;}
</style>
</head>

<body>

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="openTab('users')">👤 Users</div>
  <div class="tab" onclick="openTab('loans')">📦 Borrowers</div>
  <div class="tab" onclick="openTab('create')">➕ Create Loan</div>
</div>

<!-- USERS -->
<div id="users" class="section active"></div>

<!-- LOANS -->
<div id="loans" class="section"></div>

<!-- CREATE LOAN -->
<div id="create" class="section">

  <h3>➕ Create Borrower</h3>

  <input id="borrowerName" placeholder="Borrower Name"><br><br>
  <input id="amount" placeholder="Amount"><br><br>

  <select id="collectorSelect"></select><br><br>

  <button class="blue" onclick="createLoan()">Create Loan</button>

</div>

<script type="module">
import { db } from "./firebase.js";
import {
  collection,
  onSnapshot,
  doc,
  updateDoc,
  deleteDoc,
  addDoc,
  getDocs,
  serverTimestamp
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* =========================
   TAB SWITCH
========================= */
window.openTab = (tab)=>{

  document.querySelectorAll(".section").forEach(s=>s.classList.remove("active"));
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));

  document.getElementById(tab).classList.add("active");
  event.target.classList.add("active");
};


/* =========================
   👤 USERS (FOLDER 1)
========================= */
onSnapshot(collection(db,"users"), (snap)=>{

  const usersDiv = document.getElementById("users");
  usersDiv.innerHTML = "<h3>👤 Users Folder</h3>";

  const select = document.getElementById("collectorSelect");
  select.innerHTML = "<option>Select Collector</option>";

  snap.forEach(d=>{
    const u = d.data();

    const div = document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>${u.name}</b><br>
      ${u.email}<br>
      Role: ${u.role} | ${u.status}<br>
      Assigned: ${u.assignedName || "-"}

      <br><br>
      <button class="green" onclick="approve('${d.id}','${u.role}')">Approve</button>
      <button class="red" onclick="reject('${d.id}')">Reject</button>
    `;

    usersDiv.appendChild(div);

    // collectors dropdown
    if(u.role==="collector" && u.status==="approved"){
      const opt=document.createElement("option");
      opt.value=d.id;
      opt.textContent=u.assignedName || u.name;
      select.appendChild(opt);
    }
  });
});


/* =========================
   📦 LOANS (FOLDER 2)
========================= */
onSnapshot(collection(db,"loans"), (snap)=>{

  const loansDiv = document.getElementById("loans");
  loansDiv.innerHTML = "<h3>📦 Borrower Folder</h3>";

  snap.forEach(d=>{
    const l = d.data();

    const div=document.createElement("div");
    div.className="card";

    div.innerHTML=`
      <b>👤 ${l.borrowerName}</b><br>
      💰 ₱${l.amount}<br>
      📉 Balance ₱${l.balance}<br>
      📦 ${l.status}<br>
      👷 ${l.assignedCollectorName}

      <br><br>
      <button class="green" onclick="markPaid('${d.id}')">Paid</button>
      <button class="red" onclick="deleteLoan('${d.id}')">Delete</button>
    `;

    loansDiv.appendChild(div);
  });
});


/* =========================
   🔥 ACTIONS
========================= */

window.approve = async (id,role)=>{

  const snap = await getDocs(collection(db,"users"));
  let count=0;

  snap.forEach(d=>{
    const u=d.data();
    if(u.role===role && u.status==="approved") count++;
  });

  const name = role==="cashier"
    ? `cashier${count+1}`
    : `collector${count+1}`;

  await updateDoc(doc(db,"users",id),{
    status:"approved",
    assignedName:name
  });
};

window.reject = async (id)=>{
  await updateDoc(doc(db,"users",id),{
    status:"rejected"
  });
};

window.deleteLoan = async (id)=>{
  await deleteDoc(doc(db,"loans",id));
};

window.markPaid = async (id)=>{
  await updateDoc(doc(db,"loans",id),{
    status:"paid",
    balance:0
  });
};


/* =========================
   💰 CREATE LOAN
========================= */
window.createLoan = async ()=>{

  const name=document.getElementById("borrowerName").value;
  const amount=Number(document.getElementById("amount").value);
  const collectorId=document.getElementById("collectorSelect").value;

  if(!name || !amount || !collectorId){
    alert("Fill all fields");
    return;
  }

  const snap = await getDocs(collection(db,"users"));

  let collectorName="";

  snap.forEach(d=>{
    if(d.id===collectorId){
      collectorName=d.data().assignedName || d.data().name;
    }
  });

  await addDoc(collection(db,"loans"),{
    borrowerName:name,
    amount,
    balance:amount,
    status:"active",
    assignedCollectorId:collectorId,
    assignedCollectorName:collectorName,
    createdAt:serverTimestamp()
  });

  alert("Loan Created!");
};

</script>

</body>
</html>
